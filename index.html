<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio Pro</title>
    <style>
        /* ══════════ DESIGN NOIR & BLANC ══════════ */
        :root {
            --bg-main: #000000;
            --bg-card: #121212;
            --bg-input: #222222;
            --border-color: #333333;
            --accent-white: #ffffff;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --error-color: #ff4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ══════════ EN-TÊTE PROFIL ══════════ */
        header {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid var(--border-color);
        }

        /* Photo de profil personnalisée ou chargée */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-white);
            background: var(--bg-main);
        }

        /* Version Style Noir Minimaliste (Par défaut) */
        .profile-img-black {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent-white);
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-white);
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .profile-info h1 {
            font-size: 24px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .profile-info h2 {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .profile-info p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .social-links {
            margin-top: 12px;
            display: flex;
            gap: 15px;
        }

        .social-links a {
            color: var(--text-main);
            text-decoration: underline;
            font-size: 13px;
        }

        .social-links a:hover {
            color: var(--text-muted);
        }

        /* ══════════ BARRE DE CONTROLE & TRI ══════════ */
        .controls-wrapper {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border-color);
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            background: var(--bg-input);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            color: var(--accent-white);
            border-color: var(--accent-white);
        }

        .filter-btn.active {
            background: var(--accent-white);
            color: var(--bg-main);
            border-color: var(--accent-white);
        }

        .sort-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        .sort-select {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            outline: none;
        }

        .sort-select:focus {
            border-color: var(--accent-white);
        }

        /* ══════════ GRILLE DE PROJETS ══════════ */
        h2.section-title {
            font-size: 18px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            border-left: 3px solid var(--accent-white);
            padding-left: 10px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, border-color 0.2s;
        }

        .project-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-white);
        }

        .project-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg-main);
            filter: grayscale(100%);
            transition: filter 0.3s;
        }
        
        .project-card:hover .project-img {
            filter: grayscale(0%);
        }

        .project-img-placeholder {
            width: 100%;
            height: 180px;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .project-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .project-cat {
            color: var(--text-main);
            font-weight: 700;
            text-transform: uppercase;
        }

        .project-date {
            color: var(--text-muted);
        }

        .project-title {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .project-tech {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .project-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto; 
            position: relative;   
            z-index: 999;         
            pointer-events: auto; 
        }

        .btn {
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-link {
            background: var(--accent-white);
            color: var(--bg-main);
            border: 1px solid var(--accent-white);
        }

        .btn-link:hover {
            background: transparent;
            color: var(--accent-white);
        }

        .btn-download {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-download:hover {
            border-color: var(--accent-white);
            background: var(--bg-input);
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .error-box {
            background: #1a0a0a;
            border: 1px dashed var(--error-color);
            color: #ffcccc;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <header id="profile-container">
            <div class="loading">Chargement du profil...</div>
        </header>

        <div class="controls-wrapper">
            <div class="filter-container" id="filters-container"></div>
            
            <div class="sort-container">
                <span class="sort-label">Trier par :</span>
                <select class="sort-select" id="sort-date-select">
                    <option value="recent">📅 Plus récents</option>
                    <option value="ancien">⏳ Plus anciens</option>
                </select>
            </div>
        </div>

        <main>
            <h2 class="section-title">Mes Réalisations</h2>
            <div id="diagnostic-container"></div>
            <div class="projects-grid" id="projects-container">
                <div class="loading">Chargement des projets...</div>
            </div>
        </main>
    </div>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/rafi-lgtm/myprofils/main/data.json";
        
        let listeProjetsGlobale = [];
        let categorieActive = "all";

        function declencherTelechargement(base64Data, nomFichier) {
            try {
                const byteCharacters = atob(base64Data);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/octet-stream' });
                const blobUrl = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = nomFichier;
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                alert("Erreur lors du téléchargement : " + error.message);
            }
        }

        function extraireDate(projet) {
            if (!projet.date) return new Date(0);
            const parties = projet.date.split('/');
            if (parties.length === 3) {
                return new Date(parties[2], parties[1] - 1, parties[0]);
            }
            return new Date(projet.date);
        }

        function appliquerAffichageFiltresEtTri() {
            const projetsContainer = document.getElementById('projects-container');
            const triOrdre = document.getElementById('sort-date-select').value;

            let projetsTraites = [...listeProjetsGlobale];
            projetsTraites.sort((a, b) => {
                const dateA = extraireDate(a);
                const dateB = extraireDate(b);
                return triOrdre === 'recent' ? dateB - dateA : dateA - dateB;
            });

            projetsContainer.innerHTML = '';

            projetsTraites.forEach((projet) => {
                const catProjet = projet.cat ? projet.cat.trim() : 'Général';
                
                if (categorieActive !== 'all' && catProjet.toLowerCase() !== categorieActive.toLowerCase()) {
                    return;
                }

                const card = document.createElement('div');
                card.className = 'project-card';

                let imageHTML = `<div class="project-img-placeholder">📁</div>`;
                if (projet.photo && (projet.photo.startsWith('data:image') || projet.photo.startsWith('http'))) {
                    imageHTML = `<img class="project-img" src="${projet.photo}" alt="${projet.titre}">`;
                }

                const dateAffichage = projet.date ? projet.date : new Date().toLocaleDateString('fr-FR');

                card.innerHTML = `
                    ${imageHTML}
                    <div class="project-content">
                        <div class="project-meta">
                            <span class="project-cat">${catProjet}</span>
                            <span class="project-date">${dateAffichage}</span>
                        </div>
                        <h3 class="project-title">${projet.titre}</h3>
                        <p class="project-desc">${projet.desc || 'Aucune description.'}</p>
                        ${projet.tech ? `<div class="project-tech">🛠️ ${projet.tech}</div>` : ''}
                        <div class="project-actions"></div>
                    </div>
                `;

                const actionsDiv = card.querySelector('.project-actions');

                if (projet.link && projet.link.trim() !== "") {
                    const linkBtn = document.createElement('a');
                    linkBtn.className = 'btn btn-link';
                    linkBtn.href = projet.link;
                    linkBtn.target = '_blank';
                    linkBtn.innerHTML = '🌐 Voir le site';
                    actionsDiv.appendChild(linkBtn);
                }

                if (projet.fichier_data && projet.fichier_nom) {
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'btn btn-download';
                    downloadBtn.innerHTML = `💾 Fichier : ${projet.fichier_nom}`;
                    
                    downloadBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        declencherTelechargement(projet.fichier_data, projet.fichier_nom);
                    });
                    actionsDiv.appendChild(downloadBtn);
                }

                projetsContainer.appendChild(card);
            });
        }

        async function chargerPortfolio() {
            try {
                const response = await fetch(`${DATA_URL}?t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`Erreur HTTP ! Statut : ${response.status}`);
                }
                
                let data;
                try {
                    data = await response.json();
                } catch (jsonError) {
                    throw new Error(`Structure JSON invalide.`);
                }

                const profil = data.profil || {};
                const nomUtilisateur = profil.nom || 'Mon Portfolio';
                const initiale = nomUtilisateur.charAt(0).toUpperCase();

                // Génération de la photo de profil : Utilise le JSON si dispo, sinon applique le style NOIR avec initiale
                let photoProfilHTML = `<div class="profile-img-black">${initiale}</div>`;
                if (profil.photo && profil.photo.trim() !== "") {
                    photoProfilHTML = `<img class="profile-img" src="${profil.photo}" alt="Avatar" onerror="this.outerHTML='<div class=\"profile-img-black\">${initiale}</div>';">`;
                }

                document.getElementById('profile-container').innerHTML = `
                    ${photoProfilHTML}
                    <div class="profile-info">
                        <h1>${nomUtilisateur}</h1>
                        <h2>${profil.titre || 'Développeur / Concepteur'}</h2>
                        <p>${profil.bio || 'Bienvenue sur mon espace personnel.'}</p>
                        <div class="social-links">
                            ${profil.github ? `<a href="${profil.github}" target="_blank">GitHub</a>` : ''}
                            ${profil.instagram ? `<a href="${profil.instagram}" target="_blank">Instagram</a>` : ''}
                        </div>
                    </div>
                `;

                if (!data.projets || data.projets.length === 0) {
                    document.getElementById('projects-container').innerHTML = `<div class="loading">Aucun projet trouvé.</div>`;
                    return;
                }

                listeProjetsGlobale = data.projets;

                const filtersContainer = document.getElementById('filters-container');
                const categories = new Set();
                listeProjetsGlobale.forEach(p => { if(p.cat) categories.add(p.cat.trim()) });

                filtersContainer.innerHTML = `<button class="filter-btn active" data-target="all">🌟 Tous</button>`;
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.setAttribute('data-target', cat.toLowerCase());
                    btn.textContent = cat;
                    filtersContainer.appendChild(btn);
                });

                const boutonsFiltres = document.querySelectorAll('.filter-btn');
                boutonsFiltres.forEach(bouton => {
                    bouton.addEventListener('click', () => {
                        boutonsFiltres.forEach(b => b.classList.remove('active'));
                        bouton.classList.add('active');
                        categorieActive = bouton.getAttribute('data-target');
                        appliquerAffichageFiltresEtTri();
                    });
                });

                document.getElementById('sort-date-select').addEventListener('change', appliquerAffichageFiltresEtTri);
                appliquerAffichageFiltresEtTri();

            } catch (error) {
                console.error(error);
                
                // En cas d'erreur de chargement du JSON, on génère un profil de secours propre avec le badge noir "P"
                document.getElementById('profile-container').innerHTML = `
                    <div class="profile-img-black">P</div>
                    <div class="profile-info">
                        <h1>Mon Portfolio</h1>
                        <h2>Développeur / Concepteur</h2>
                        <p>Bienvenue sur mon espace personnel.</p>
                    </div>
                `;

                document.getElementById('diagnostic-container').innerHTML = `
                    <div class="error-box">
                        <strong>❌ ÉCHEC DE LA SYNCHRONISATION GITHUB :</strong><br>
                        Le fichier <code>data.json</code> n'a pas pu être lu. Vérifie qu'il est bien placé à la racine de ton dépôt GitHub.
                    </div>
                `;
                document.getElementById('projects-container').innerHTML = '';
            }
        }

        window.addEventListener('DOMContentLoaded', chargerPortfolio);
    </script>
</body>
</html>
