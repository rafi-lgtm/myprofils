<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio Pro</title>
    <style>
        /* ══════════ DESIGN & THEME SOMBRE ══════════ */
        :root {
            --bg-main: #0d0e15;
            --bg-card: #161925;
            --bg-input: #222538;
            --accent: #584cf4;
            --accent-green: #10b981;
            --text-main: #ffffff;
            --text-muted: #a0a5c0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ══════════ EN-TÊTE PROFIL ══════════ */
        header {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            background: var(--bg-main);
        }

        .profile-info h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .profile-info h2 {
            font-size: 16px;
            color: var(--accent-green);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .profile-info p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .social-links {
            margin-top: 10px;
            display: flex;
            gap: 15px;
        }

        .social-links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        /* ══════════ SYSTÈME DE TRI (FILTRES) ══════════ */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: var(--bg-card);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--bg-input);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            color: var(--text-main);
            border-color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--text-main);
            border-color: var(--accent);
        }

        /* ══════════ GRILLE DE PROJETS ══════════ */
        h2.section-title {
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, opacity 0.3s;
        }

        /* Quand un projet est masqué par le tri */
        .project-card.hidden {
            display: none;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg-main);
        }

        .project-img-placeholder {
            width: 100%;
            height: 180px;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 40px;
        }

        .project-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .project-cat {
            color: var(--accent-green);
            font-weight: bold;
            text-transform: uppercase;
        }

        .project-date {
            color: var(--text-muted);
        }

        .project-title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .project-tech {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #222538;
        }

        /* ══════════ BOUTONS CLIQUABLES ══════════ */
        .project-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto; 
            position: relative;
            z-index: 10;       
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-link {
            background: var(--accent);
            color: var(--text-main);
        }

        .btn-download {
            background: #1e293b;
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        .btn-download:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 👩‍💻 BLOC PROFIL -->
        <header id="profile-container">
            <div class="loading">Chargement du profil...</div>
        </header>

        <!-- 📑 ZONE DE TRI / FILTRES -->
        <div class="filter-container" id="filters-container"></div>

        <!-- 📁 BLOC PROJETS -->
        <main>
            <h2 class="section-title">Mes Réalisations</h2>
            <div class="projects-grid" id="projects-container">
                <div class="loading">Chargement des projets...</div>
            </div>
        </main>
    </div>

    <script>
        // URL brute de ton fichier data.json sur GitHub
        const DATA_URL = "https://raw.githubusercontent.com/rafi-lgtm/myprofils/main/data.json";

        // Moteur de téléchargement pour les fichiers (Word, PPT, F3D, etc.)
        function declencherTelechargement(base64Data, nomFichier) {
            try {
                const byteCharacters = atob(base64Data);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/octet-stream' });
                const blobUrl = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = nomFichier;
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                alert("Erreur lors du téléchargement : " + error.message);
            }
        }

        // Fonction principale de chargement
        async function chargerPortfolio() {
            try {
                const response = await fetch(`${DATA_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error("Erreur de récupération.");
                
                const data = await response.json();

                // 1. Rendu du Profil
                const profil = data.profil;
                document.getElementById('profile-container').innerHTML = `
                    <img class="profile-img" src="${profil.photo || 'https://via.placeholder.com/150'}" alt="Avatar">
                    <div class="profile-info">
                        <h1>${profil.nom || 'Votre Nom'}</h1>
                        <h2>${profil.titre || 'Votre Poste'}</h2>
                        <p>${profil.bio || 'Aucune biographie rédigée.'}</p>
                        <div class="social-links">
                            ${profil.github ? `<a href="${profil.github}" target="_blank">🔗 GitHub</a>` : ''}
                            ${profil.instagram ? `<a href="${profil.instagram}" target="_blank">🔗 Instagram</a>` : ''}
                        </div>
                    </div>
                `;

                // Vérification si des projets existent
                const projetsContainer = document.getElementById('projects-container');
                if (!data.projets || data.projets.length === 0) {
                    projetsContainer.innerHTML = `<div class="loading">Aucun projet disponible.</div>`;
                    return;
                }

                projetsContainer.innerHTML = ''; 

                // 2. Génération automatique des boutons de tri (Filtres)
                const filtersContainer = document.getElementById('filters-container');
                const categories = new Set();
                data.projets.forEach(p => { if(p.cat) categories.add(p.cat.trim()) });

                // Création du bouton "Tous"
                filtersContainer.innerHTML = `<button class="filter-btn active" data-target="all">🌟 Tous</button>`;
                
                // Création d'un bouton pour chaque catégorie unique trouvée
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.setAttribute('data-target', cat.toLowerCase());
                    btn.textContent = cat;
                    filtersContainer.appendChild(btn);
                });

                // 3. Rendu des cartes projets dans la grille
                data.projets.forEach((projet) => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    
                    // On attache la catégorie en minuscule sur la carte pour le script de tri
                    const projetCat = projet.cat ? projet.cat.trim().toLowerCase() : 'général';
                    card.setAttribute('data-category', projetCat);

                    let imageHTML = `<div class="project-img-placeholder">📁</div>`;
                    if (projet.photo && projet.photo.startsWith('data:image')) {
                        imageHTML = `<img class="project-img" src="${projet.photo}" alt="${projet.titre}">`;
                    }

                    const dateAffichage = projet.date ? projet.date : new Date().toLocaleDateString('fr-FR');

                    card.innerHTML = `
                        ${imageHTML}
                        <div class="project-content">
                            <div class="project-meta">
                                <span class="project-cat">${projet.cat || 'Général'}</span>
                                <span class="project-date">📅 ${dateAffichage}</span>
                            </div>
                            <h3 class="project-title">${projet.titre}</h3>
                            <p class="project-desc">${projet.desc || 'Aucune description.'}</p>
                            ${projet.tech ? `<div class="project-tech">🛠️ ${projet.tech}</div>` : ''}
                            <div class="project-actions"></div>
                        </div>
                    `;

                    // Injection des boutons d'action (Lien et Téléchargement)
                    const actionsDiv = card.querySelector('.project-actions');

                    if (projet.link && projet.link.trim() !== "") {
                        const linkBtn = document.createElement('a');
                        linkBtn.className = 'btn btn-link';
                        linkBtn.href = projet.link;
                        linkBtn.target = '_blank';
                        linkBtn.innerHTML = '🌐 Voir le site';
                        actionsDiv.appendChild(linkBtn);
                    }

                    const dataFichier = projet.fichier_data || '';
                    const nomFichier = projet.fichier_nom || '';

                    if (dataFichier.trim() !== "" && nomFichier.trim() !== "") {
                        const downloadBtn = document.createElement('button');
                        downloadBtn.className = 'btn btn-download';
                        downloadBtn.innerHTML = `💾 Télécharger : ${nomFichier}`;
                        
                        // Écouteur de clic direct et isolé pour le téléchargement
                        downloadBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            declencherTelechargement(dataFichier, nomFichier);
                        });
                        actionsDiv.appendChild(downloadBtn);
                    }

                    projetsContainer.appendChild(card);
                });

                // 4. Logique d'activation du Tri au clic sur les boutons de filtres
                const boutonsFiltres = document.querySelectorAll('.filter-btn');
                const cartesProjets = document.querySelectorAll('.project-card');

                boutonsFiltres.forEach(bouton => {
                    bouton.addEventListener('click', () => {
                        // Gérer le style actif sur les boutons
                        boutonsFiltres.forEach(b => b.classList.remove('active'));
                        bouton.classList.add('active');

                        const cible = bouton.getAttribute('data-target');

                        // Filtrer les cartes sans toucher au DOM profond (les clics restent actifs)
                        cartesProjets.forEach(carte => {
                            const categorieCarte = carte.getAttribute('data-category');
                            
                            if (cible === 'all' || categorieCarte === cible) {
                                carte.classList.remove('hidden'); // On affiche
                            } else {
                                carte.classList.add('hidden');    // On masque
                            }
                        });
                    });
                });

            } catch (error) {
                console.error(error);
                document.getElementById('profile-container').innerHTML = `<div class="loading" style="color:#ef4444;">Erreur de chargement du profil.</div>`;
                document.getElementById('projects-container').innerHTML = `<div class="loading" style="color:#ef4444;">Impossible de se connecter à GitHub.</div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', chargerPortfolio);
    </script>
</body>
</html>
