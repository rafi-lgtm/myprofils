<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio Pro</title>
    <style>
        /* ══════════ VARIABLES DE DESIGN (THEMES) ══════════ */
        :root {
            --bg-main: #0a0a0a;
            --bg-pattern: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            --bg-card: #121212;
            --bg-input: #222222;
            --border-color: #333333;
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --error-color: #ff4444;
        }

        [data-theme="light"] {
            --bg-main: #f4f4f6;
            --bg-pattern: linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            --bg-card: #ffffff;
            --bg-input: #eaeaea;
            --border-color: #dddddd;
            --accent-color: #000000;
            --text-main: #000000;
            --text-muted: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            background-image: var(--bg-pattern);
            background-size: 24px 24px;
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        /* ══════════ BOUTON THEME (DARK / LIGHT) ══════════ */
        .theme-switch-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .theme-btn {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .theme-btn:hover { border-color: var(--accent-color); }

        /* ══════════ EN-TÊTE PROFIL ══════════ */
        header {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        .profile-img-black {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
        }

        .profile-info h1 { font-size: 24px; margin-bottom: 5px; font-weight: 700; }
        .profile-info h2 { font-size: 15px; color: var(--text-main); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .profile-info p { color: var(--text-muted); font-size: 14px; line-height: 1.5; }

        .social-links { margin-top: 12px; display: flex; gap: 15px; }
        .social-links a { color: var(--text-main); text-decoration: underline; font-size: 13px; }

        /* ══════════ BARRE DE CONTROLE & TRI ══════════ */
        .controls-wrapper {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border-color);
        }

        .filter-container { display: flex; flex-wrap: wrap; gap: 8px; }

        .filter-btn {
            background: var(--bg-input);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .filter-btn:hover { color: var(--accent-color); border-color: var(--accent-color); }
        .filter-btn.active { background: var(--accent-color); color: var(--bg-main); border-color: var(--accent-color); }

        .sort-select {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            outline: none;
        }

        /* ══════════ GRILLE DE PROJETS ══════════ */
        h2.section-title {
            font-size: 18px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            cursor: pointer; /* Indique que la carte est cliquable */
            position: relative;
        }

        .project-card:hover { border-color: var(--accent-color); }

        /* Indicateur visuel qu'il y a plusieurs images */
        .gallery-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            z-index: 2;
        }

        .project-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.3s;
        }
        
        .project-card:hover .project-img { filter: grayscale(0%); }

        .project-img-placeholder {
            width: 100%;
            height: 180px;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .project-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .project-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 12px; }
        .project-cat { font-weight: 700; text-transform: uppercase; }
        .project-date { color: var(--text-muted); }
        .project-title { font-size: 18px; margin-bottom: 10px; font-weight: 600; }
        .project-desc { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }
        .project-tech { font-size: 12px; color: var(--text-muted); background: var(--bg-main); padding: 6px 10px; border-radius: 4px; margin-bottom: 20px; border: 1px solid var(--border-color); }

        .project-actions { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

        .btn {
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-link { background: var(--accent-color); color: var(--bg-main); border: 1px solid var(--accent-color); }
        .btn-link:hover { background: transparent; color: var(--accent-color); }
        .btn-download { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-download:hover { border-color: var(--accent-color); background: var(--bg-input); }

        .loading { text-align: center; color: var(--text-muted); padding: 50px; font-size: 15px; }
        .error-box { background: rgba(255, 68, 68, 0.05); border: 1px dashed var(--error-color); color: var(--error-color); padding: 20px; border-radius: 8px; margin: 20px 0; font-family: monospace; font-size: 13px; }

        /* ══════════ MODALE GALERIE D'IMAGES (LIGHTBOX) ══════════ */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none; /* Masquée par défaut */
            align-items: center;
            justify-content: center;
        }

        .lightbox.active { display: flex; }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lightbox-caption {
            color: #ffffff;
            margin-top: 15px;
            font-size: 15px;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 20px;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: #ffffff;
            font-size: 35px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .lightbox-close:hover { color: var(--error-color); }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            font-size: 28px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .lightbox-nav:hover { background: rgba(255, 255, 255, 0.25); }
        .lightbox-prev { left: -70px; }
        .lightbox-next { right: -70px; }

        /* Masquer les flèches sur mobile si elles sortent de l'écran */
        @media (max-width: 768px) {
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
            .lightbox-nav { background: rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="theme-switch-wrapper">
            <button class="theme-btn" id="theme-toggle-btn">
                <span id="theme-icon">☀️</span> <span id="theme-text">Mode Clair</span>
            </button>
        </div>

        <header id="profile-container">
            <div class="loading">Chargement du profil...</div>
        </header>

        <div class="controls-wrapper">
            <div class="filter-container" id="filters-container"></div>
            <div class="sort-container">
                <select class="sort-select" id="sort-date-select">
                    <option value="recent">📅 Plus récents</option>
                    <option value="ancien">⏳ Plus anciens</option>
                </select>
            </div>
        </div>

        <main>
            <h2 class="section-title">Mes Réalisations</h2>
            <div id="diagnostic-container"></div>
            <div class="projects-grid" id="projects-container">
                <div class="loading">Chargement des projets...</div>
            </div>
        </main>
    </div>

    <div class="lightbox" id="lightbox-modal">
        <div class="lightbox-content" id="lightbox-content-box">
            <button class="lightbox-close" id="lightbox-close-btn">&times;</button>
            <button class="lightbox-nav lightbox-prev" id="lightbox-prev-btn">&#x2039;</button>
            <img src="" alt="Aperçu" class="lightbox-img" id="lightbox-main-img">
            <button class="lightbox-nav lightbox-next" id="lightbox-next-btn">&#x203A;</button>
            <div class="lightbox-caption" id="lightbox-caption-text">Image 1 / 1</div>
        </div>
    </div>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/rafi-lgtm/myprofils/main/data.json";
        
        let listeProjetsGlobale = [];
        let categorieActive = "all";

        // Variables d'état pour la Galerie
        let imagesGalerieEnCours = [];
        let indexImageActif = 0;

        // ══════════ GESTION DU THEME ══════════
        function initialiserTheme() {
            const themeBouton = document.getElementById('theme-toggle-btn');
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            
            const themeSauvegarde = localStorage.getItem('theme');
            const preferenceSystemeClair = window.matchMedia('(prefers-color-scheme: light)').matches;
            
            let themeActuel = "dark"; 
            if (themeSauvegarde === "light" || (!themeSauvegarde && preferenceSystemeClair)) {
                themeActuel = "light";
            }

            document.documentElement.setAttribute('data-theme', themeActuel);
            mettreAJourInterfaceBouton(themeActuel, themeIcon, themeText);

            themeBouton.addEventListener('click', () => {
                let nouveauTheme = document.documentElement.getAttribute('data-theme') === "dark" ? "light" : "dark";
                document.documentElement.setAttribute('data-theme', nouveauTheme);
                localStorage.setItem('theme', nouveauTheme);
                mettreAJourInterfaceBouton(nouveauTheme, themeIcon, themeText);
            });
        }

        function mettreAJourInterfaceBouton(theme, iconEl, textEl) {
            if (theme === "light") {
                iconEl.textContent = "🌙"; textEl.textContent = "Mode Sombre";
            } else {
                iconEl.textContent = "☀️"; textEl.textContent = "Mode Clair";
            }
        }

        // ══════════ GESTION DE LA GALERIE (LIGHTBOX) ══════════
        function initialiserLightbox() {
            const modal = document.getElementById('lightbox-modal');
            const closeBtn = document.getElementById('lightbox-close-btn');
            const prevBtn = document.getElementById('lightbox-prev-btn');
            const nextBtn = document.getElementById('lightbox-next-btn');

            // Fermer au clic sur la croix
            closeBtn.addEventListener('click', fermerLightbox);
            
            // Fermer au clic à l'extérieur de l'image
            modal.addEventListener('click', (e) => {
                if (e.target === modal) fermerLightbox();
            });

            // Boutons de navigation
            prevBtn.addEventListener('click', (e) => { e.stopPropagation(); changerImage(-1); });
            nextBtn.addEventListener('click', (e) => { e.stopPropagation(); changerImage(1); });

            // Support des touches du clavier (Échap, Gauche, Droite)
            document.addEventListener('keydown', (e) => {
                if (!modal.classList.contains('active')) return;
                if (e.key === "Escape") fermerLightbox();
                if (e.key === "ArrowLeft") changerImage(-1);
                if (e.key === "ArrowRight") changerImage(1);
            });
        }

        function ouvrirLightbox(listeImages) {
            if (!listeImages || listeImages.length === 0) return;
            
            imagesGalerieEnCours = listeImages;
            indexImageActif = 0;
            
            document.getElementById('lightbox-modal').classList.add('active');
            mettreAJourImageLightbox();
        }

        function fermerLightbox() {
            document.getElementById('lightbox-modal').classList.remove('active');
        }

        function changerImage(direction) {
            indexImageActif += direction;
            if (indexImageActif >= imagesGalerieEnCours.length) indexImageActif = 0;
            if (indexImageActif < 0) indexImageActif = imagesGalerieEnCours.length - 1;
            mettreAJourImageLightbox();
        }

        function mettreAJourImageLightbox() {
            const imgEl = document.getElementById('lightbox-main-img');
            const captionEl = document.getElementById('lightbox-caption-text');
            const prevBtn = document.getElementById('lightbox-prev-btn');
            const nextBtn = document.getElementById('lightbox-next-btn');

            imgEl.src = imagesGalerieEnCours[indexImageActif];
            captionEl.textContent = `Image ${indexImageActif + 1} / ${imagesGalerieEnCours.length}`;

            // Masquer les flèches s'il n'y a qu'une seule image
            if (imagesGalerieEnCours.length <= 1) {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'flex';
                nextBtn.style.display = 'flex';
            }
        }

        // ══════════ PARSAGE DES DATES ET CHARGEMENT SCRIPT ══════════
        function extraireDate(projet) {
            if (!projet.date) return new Date(0);
            const parties = projet.date.split('/');
            if (parties.length === 3) return new Date(parties[2], parties[1] - 1, parties[0]);
            return new Date(projet.date);
        }

        function declencherTelechargement(base64Data, nomFichier) {
            try {
                const byteCharacters = atob(base64Data);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/octet-stream' });
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl; link.download = nomFichier;
                document.body.appendChild(link); link.click();
                document.body.removeChild(link); URL.revokeObjectURL(blobUrl);
            } catch (error) { alert("Erreur lors du téléchargement : " + error.message); }
        }

        function appliquerAffichageFiltresEtTri() {
            const projetsContainer = document.getElementById('projects-container');
            const triOrdre = document.getElementById('sort-date-select').value;

            let projetsTraites = [...listeProjetsGlobale];
            projetsTraites.sort((a, b) => {
                const dateA = extraireDate(a); const dateB = extraireDate(b);
                return triOrdre === 'recent' ? dateB - dateA : dateA - dateB;
            });

            projetsContainer.innerHTML = '';

            projetsTraites.forEach((projet) => {
                const catProjet = projet.cat ? projet.cat.trim() : 'Général';
                if (categorieActive !== 'all' && catProjet.toLowerCase() !== categorieActive.toLowerCase()) return;

                // Extraction de toutes les images disponibles pour la galerie
                let toutesLesImages = [];
                if (projet.photos && Array.isArray(projet.photos)) {
                    toutesLesImages = projet.photos;
                } else if (projet.photo && projet.photo.trim() !== "") {
                    toutesLesImages = [projet.photo];
                }

                const card = document.createElement('div');
                card.className = 'project-card';

                // Gestion du badge si album multi-images
                let badgeHTML = toutesLesImages.length > 1 ? `<div class="gallery-badge">📸 ${toutesLesImages.length} images</div>` : '';

                // Image principale à afficher en couverture
                let imageHTML = `<div class="project-img-placeholder">📁</div>`;
                if (toutesLesImages.length > 0) {
                    imageHTML = `<img class="project-img" src="${toutesLesImages[0]}" alt="${projet.titre}">`;
                }

                const dateAffichage = projet.date ? projet.date : new Date().toLocaleDateString('fr-FR');

                card.innerHTML = `
                    ${badgeHTML}
                    ${imageHTML}
                    <div class="project-content">
                        <div class="project-meta">
                            <span class="project-cat">${catProjet}</span>
                            <span class="project-date">${dateAffichage}</span>
                        </div>
                        <h3 class="project-title">${projet.titre}</h3>
                        <p class="project-desc">${projet.desc || 'Aucune description.'}</p>
                        ${projet.tech ? `<div class="project-tech">🛠️ ${projet.tech}</div>` : ''}
                        <div class="project-actions"></div>
                    </div>
                `;

                // Rendre TOUTE la carte cliquable pour lancer la galerie
                card.addEventListener('click', (e) => {
                    // Empêcher l'ouverture de la galerie si on clique sur un bouton de téléchargement ou un lien externe
                    if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
                    ouvrirLightbox(toutesLesImages);
                });

                const actionsDiv = card.querySelector('.project-actions');

                if (projet.link && projet.link.trim() !== "") {
                    const linkBtn = document.createElement('a');
                    linkBtn.className = 'btn btn-link'; linkBtn.href = projet.link; linkBtn.target = '_blank';
                    linkBtn.innerHTML = '🌐 Voir le site';
                    actionsDiv.appendChild(linkBtn);
                }

                if (projet.fichier_data && projet.fichier_nom) {
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'btn btn-download'; downloadBtn.innerHTML = `💾 Fichier : ${projet.fichier_nom}`;
                    downloadBtn.addEventListener('click', (e) => {
                        e.preventDefault(); e.stopPropagation();
                        declencherTelechargement(projet.fichier_data, projet.fichier_nom);
                    });
                    actionsDiv.appendChild(downloadBtn);
                }

                projetsContainer.appendChild(card);
            });
        }

        async function chargerPortfolio() {
            initialiserTheme();
            initialiserLightbox();

            try {
                const response = await fetch(`${DATA_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error(`Erreur HTTP ! Statut : ${response.status}`);
                
                let data = await response.json();
                const profil = data.profil || {};
                const nomUtilisateur = profil.nom || 'Mon Portfolio';
                const initiale = nomUtilisateur.charAt(0).toUpperCase();

                let photoProfilHTML = `<div class="profile-img-black">${initiale}</div>`;
                if (profil.photo && profil.photo.trim() !== "") {
                    photoProfilHTML = `<img class="profile-img" src="${profil.photo}" alt="Avatar" onerror="this.outerHTML='<div class=\"profile-img-black\">${initiale}</div>';">`;
                }

                document.getElementById('profile-container').innerHTML = `
                    ${photoProfilHTML}
                    <div class="profile-info">
                        <h1>${nomUtilisateur}</h1>
                        <h2>${profil.titre || 'Développeur / Concepteur'}</h2>
                        <p>${profil.bio || 'Bienvenue sur mon espace personnel.'}</p>
                        <div class="social-links">
                            ${profil.github ? `<a href="${profil.github}" target="_blank">GitHub</a>` : ''}
                            ${profil.instagram ? `<a href="${profil.instagram}" target="_blank">Instagram</a>` : ''}
                        </div>
                    </div>
                `;

                if (!data.projets || data.projets.length === 0) {
                    document.getElementById('projects-container').innerHTML = `<div class="loading">Aucun projet trouvé.</div>`;
                    return;
                }

                listeProjetsGlobale = data.projets;

                const filtersContainer = document.getElementById('filters-container');
                const categories = new Set();
                listeProjetsGlobale.forEach(p => { if(p.cat) categories.add(p.cat.trim()) });

                filtersContainer.innerHTML = `<button class="filter-btn active" data-target="all">🌟 Tous</button>`;
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn'; btn.setAttribute('data-target', cat.toLowerCase()); btn.textContent = cat;
                    filtersContainer.appendChild(btn);
                });

                const boutonsFiltres = document.querySelectorAll('.filter-btn');
                boutonsFiltres.forEach(bouton => {
                    bouton.addEventListener('click', () => {
                        boutonsFiltres.forEach(b => b.classList.remove('active'));
                        bouton.classList.add('active');
                        categorieActive = bouton.getAttribute('data-target');
                        appliquerAffichageFiltresEtTri();
                    });
                });

                document.getElementById('sort-date-select').addEventListener('change', appliquerAffichageFiltresEtTri);
                appliquerAffichageFiltresEtTri();

            } catch (error) {
                console.error(error);
                document.getElementById('diagnostic-container').innerHTML = `
                    <div class="error-box">
