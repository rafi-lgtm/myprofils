<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio Pro</title>
    <style>
        /* ══════════ VARIABLES DE DESIGN (THEMES) ══════════ */
        :root {
            --bg-main: #0a0a0a;
            --bg-pattern: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            --bg-card: #121212;
            --bg-input: #222222;
            --border-color: #333333;
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --error-color: #ff4444;
            --accent-purple: #584cf4;
        }

        [data-theme="light"] {
            --bg-main: #f4f4f6;
            --bg-pattern: linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            --bg-card: #ffffff;
            --bg-input: #eaeaea;
            --border-color: #dddddd;
            --accent-color: #000000;
            --text-main: #000000;
            --text-muted: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            background-image: var(--bg-pattern);
            background-size: 24px 24px;
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ══════════ BOUTON THEME ══════════ */
        .theme-switch-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .theme-btn {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .theme-btn:hover { border-color: var(--accent-color); }

        /* ══════════ EN-TÊTE PROFIL ══════════ */
        header {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid var(--border-color);
        }

        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-color); }
        .profile-img-black { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--accent-color); background: #000000; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #ffffff; }
        
        .profile-info h1 { font-size: 24px; margin-bottom: 5px; }
        .profile-info h2 { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .profile-info p { color: var(--text-muted); font-size: 14px; line-height: 1.5; }
        .social-links { margin-top: 12px; display: flex; gap: 15px; }
        .social-links a { color: var(--text-main); text-decoration: underline; font-size: 13px; }

        /* ══════════ CONTROLES ══════════ */
        .controls-wrapper {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border-color);
        }

        .filter-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-btn { background: var(--bg-input); color: var(--text-muted); padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border-color); cursor: pointer; font-size: 13px; font-weight: 600; }
        .filter-btn.active { background: var(--accent-color); color: var(--bg-main); border-color: var(--accent-color); }

        .sort-select { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 6px; outline: none; }

        /* ══════════ GRILLE ══════════ */
        h2.section-title { font-size: 18px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; border-left: 3px solid var(--accent-color); padding-left: 10px; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .project-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer;
            position: relative;
        }
        .project-card:hover { border-color: var(--accent-purple); }

        .project-img { width: 100%; height: 180px; object-fit: cover; }
        .project-img-placeholder { width: 100%; height: 180px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; font-size: 30px; border-bottom: 1px solid var(--border-color); }

        /* Badge indiquant le nombre de photos */
        .card-gallery-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 4px 8px; border-radius: 4px;
            font-size: 11px; font-weight: bold; z-index: 2;
        }

        .project-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .project-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 12px; }
        .project-cat { font-weight: 700; text-transform: uppercase; color: var(--accent-purple); }
        .project-title { font-size: 18px; margin-bottom: 10px; }
        .project-desc-short { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .click-prompt { font-size: 12px; color: var(--accent-purple); margin-top: auto; font-style: italic; display: flex; align-items: center; gap: 5px; font-weight: 500; }

        /* ══════════ FENÊTRE MODALE DÉTAILLÉE (POP-UP) ══════════ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal-window {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 750px;
            max-height: 90vh;
            border-radius: 16px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .modal-close-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: rgba(0,0,0,0.6); color: #fff;
            border: none; font-size: 28px; cursor: pointer;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        .modal-close-btn:hover { background: var(--error-color); }

        /* Galerie d'images dans le Pop-up */
        .modal-gallery-container { position: relative; width: 100%; background: #000; height: 380px; display: flex; align-items: center; justify-content: center; }
        .modal-main-img { width: 100%; height: 100%; object-fit: contain; }
        
        .modal-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6); color: white; border: none;
            font-size: 28px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            user-select: none;
        }
        .modal-nav:hover { background: var(--accent-purple); }
        .modal-prev { left: 15px; }
        .modal-next { right: 15px; }
        
        .modal-gallery-counter {
            position: absolute; bottom: 15px; background: rgba(0,0,0,0.7);
            padding: 4px 12px; border-radius: 12px; font-size: 12px; color: #fff;
        }

        /* Corps des infos dans le Pop-up */
        .modal-body { padding: 30px; }
        .modal-header-info { margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .modal-tag { display: inline-block; background: rgba(88, 76, 244, 0.15); color: #818cf8; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .modal-title { font-size: 24px; margin-bottom: 5px; }
        .modal-date { font-size: 12px; color: var(--text-muted); }

        .modal-section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; margin-top: 25px; font-weight: 700; }
        .modal-desc { font-size: 15px; line-height: 1.6; color: var(--text-main); white-space: pre-wrap; }
        .modal-tech-box { display: inline-block; background: var(--bg-input); padding: 6px 12px; border-radius: 6px; font-size: 13px; border: 1px solid var(--border-color); margin-top: 5px; }

        /* Fichiers Attachés & Actions */
        .attachments-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .btn-action {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
            text-decoration: none; cursor: pointer; border: none; width: 100%; justify-content: center;
        }
        .btn-primary { background: var(--accent-purple); color: white; margin-top: 25px; }
        .btn-primary:hover { opacity: 0.9; }
        
        .btn-download-item {
            background: var(--bg-input); color: var(--text-main);
            border: 1px solid var(--border-color); justify-content: flex-start;
        }
        .btn-download-item:hover { border-color: var(--accent-purple); background: rgba(88, 76, 244, 0.05); }

        .loading { text-align: center; color: var(--text-muted); padding: 50px; }
        .error-box { background: rgba(255, 68, 68, 0.05); border: 1px dashed var(--error-color); color: var(--error-color); padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🌓 THEME -->
        <div class="theme-switch-wrapper">
            <button class="theme-btn" id="theme-toggle-btn">
                <span id="theme-icon">☀️</span> <span id="theme-text">Mode Clair</span>
            </button>
        </div>

        <!-- 👨‍💻 EN-TÊTE -->
        <header id="profile-container"><div class="loading">Chargement du profil...</div></header>

        <!-- 📑 FILTRES -->
        <div class="controls-wrapper">
            <div class="filter-container" id="filters-container"></div>
            <div>
                <select class="sort-select" id="sort-date-select">
                    <option value="recent">📅 Récents</option>
                    <option value="ancien">⏳ Anciens</option>
                </select>
            </div>
        </div>

        <!-- 📁 GRILLE -->
        <main>
            <h2 class="section-title">Mes Réalisations</h2>
            <div id="diagnostic-container"></div>
            <div class="projects-grid" id="projects-container">
                <div class="loading">Chargement des projets...</div>
            </div>
        </main>
    </div>

    <!-- 🌐 POP-UP MODALE GLOBAL DE PROJET -->
    <div class="modal-overlay" id="project-modal">
        <div class="modal-window">
            <button class="modal-close-btn" id="modal-close-btn">&times;</button>
            
            <!-- Zone Média (Galerie) -->
            <div class="modal-gallery-container" id="modal-gallery-zone">
                <button class="modal-nav modal-prev" id="modal-prev-btn">&#x2039;</button>
                <img src="" alt="Projet" class="modal-main-img" id="modal-img-target">
                <button class="modal-nav modal-next" id="modal-next-btn">&#x203A;</button>
                <div class="modal-gallery-counter" id="modal-counter-target">1 / 1</div>
            </div>

            <!-- Contenu Texte et Téléchargements -->
            <div class="modal-body">
                <div class="modal-header-info">
                    <div class="modal-tag" id="modal-cat-target">Catégorie</div>
                    <h3 class="modal-title" id="modal-title-target">Nom du Projet</h3>
                    <div class="modal-date" id="modal-date-target">Date</div>
                </div>

                <div class="modal-section-title">Description</div>
                <p class="modal-desc" id="modal-desc-target">Détails du projet...</p>

                <div id="modal-tech-section">
                    <div class="modal-section-title">Technologies utilisées</div>
                    <div class="modal-tech-box" id="modal-tech-target">Python, HTML</div>
                </div>

                <!-- Section Fichiers Liés -->
                <div id="modal-attachments-section">
                    <div class="modal-section-title">Fichiers et documents joints</div>
                    <div class="attachments-list" id="modal-files-container"></div>
                </div>

                <!-- Lien Web Externe -->
                <a href="#" target="_blank" class="btn-action btn-primary" id="modal-link-target">🌐 Visiter / Voir le projet en ligne</a>
            </div>
        </div>
    </div>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/rafi-lgtm/myprofils/main/data.json";
        let listeProjetsGlobale = [];
        let categorieActive = "all";
        
        // États pour la galerie interne à la modale
        let imagesModale = [];
        let indexImageActive = 0;

        // ══════════ THEME ══════════
        function initialiserTheme() {
            const btn = document.getElementById('theme-toggle-btn');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            let stock = localStorage.getItem('theme') || "dark";
            
            document.documentElement.setAttribute('data-theme', stock);
            icon.textContent = stock === "light" ? "🌙" : "☀️";
            text.textContent = stock === "light" ? "Mode Sombre" : "Mode Clair";

            btn.addEventListener('click', () => {
                let fresh = document.documentElement.getAttribute('data-theme') === "dark" ? "light" : "dark";
                document.documentElement.setAttribute('data-theme', fresh);
                localStorage.setItem('theme', fresh);
                icon.textContent = fresh === "light" ? "🌙" : "☀️";
                text.textContent = fresh === "light" ? "Mode Sombre" : "Mode Clair";
            });
        }

        // ══════════ CONTROLE DU POP-UP MODALE ══════════
        function configurerEvenementsModale() {
            const overlay = document.getElementById('project-modal');
            const closeBtn = document.getElementById('modal-close-btn');
            const prevBtn = document.getElementById('modal-prev-btn');
            const nextBtn = document.getElementById('modal-next-btn');

            closeBtn.addEventListener('click', fermerProjet);
            overlay.addEventListener('click', (e) => { if(e.target === overlay) fermerProjet(); });

            prevBtn.addEventListener('click', () => naviguerImage(-1));
            nextBtn.addEventListener('click', () => naviguerImage(1));

            document.addEventListener('keydown', (e) => {
                if (!overlay.classList.contains('active')) return;
                if (e.key === "Escape") fermerProjet();
                if (e.key === "ArrowLeft") naviguerImage(-1);
                if (e.key === "ArrowRight") naviguerImage(1);
            });
        }

        function afficherProjetEnDetail(projet) {
            // 1. Rassemblement des images
            imagesModale = [];
            if(projet.photos && Array.isArray(projet.photos)) {
                imagesModale = projet.photos.filter(img => img && img.trim() !== "");
            } else if(projet.photo && projet.photo.trim() !== "") {
                imagesModale = [projet.photo];
            }

            const galZone = document.getElementById('modal-gallery-zone');
            if(imagesModale.length === 0) {
                galZone.style.display = 'none';
            } else {
                galZone.style.display = 'flex';
                indexImageActive = 0;
                mettreAJourAffichageImage();
                
                // Masquer flèches si unique image
                const prevBtn = document.getElementById('modal-prev-btn');
                const nextBtn = document.getElementById('modal-next-btn');
                prevBtn.style.display = imagesModale.length > 1 ? 'flex' : 'none';
                nextBtn.style.display = imagesModale.length > 1 ? 'flex' : 'none';
            }

            // 2. Remplissage des textes fondamentaux
            document.getElementById('modal-title-target').textContent = projet.titre;
            document.getElementById('modal-cat-target').textContent = projet.cat || "Général";
            document.getElementById('modal-date-target').textContent = projet.date || "Date non spécifiée";
            document.getElementById('modal-desc-target').textContent = projet.desc || "Aucune description fournie.";

            // 3. Technologies
            const techBox = document.getElementById('modal-tech-section');
            if(projet.tech && projet.tech.trim() !== "") {
                techBox.style.display = 'block';
                document.getElementById('modal-tech-target').textContent = projet.tech;
            } else {
                techBox.style.display = 'none';
            }

            // 4. Gestion des fichiers de téléchargements (F3D, Word, ZIP...)
            const containerFichiers = document.getElementById('modal-files-container');
            const sectionFichiers = document.getElementById('modal-attachments-section');
            containerFichiers.innerHTML = "";

            if (projet.fichier_data && projet.fichier_nom) {
                sectionFichiers.style.display = 'block';
                const fileBtn = document.createElement('button');
                fileBtn.className = 'btn-action btn-download-item';
                fileBtn.innerHTML = `📎 Télécharger la ressource : <strong>${projet.fichier_nom}</strong>`;
                fileBtn.addEventListener('click', () => {
                    declencherTelechargement(projet.fichier_data, projet.fichier_nom);
                });
                containerFichiers.appendChild(fileBtn);
            } else {
                sectionFichiers.style.display = 'none';
            }

            // 5. Lien externe
            const linkBtn = document.getElementById('modal-link-target');
            if(projet.link && projet.link.trim() !== "") {
                linkBtn.style.display = 'inline-flex';
                linkBtn.href = projet.link;
            } else {
                linkBtn.style.display = 'none';
            }

            // Ouvrir la modale à l'écran
            document.getElementById('project-modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Empêche le scroll en arrière-plan
        }

        function fermerProjet() {
            document.getElementById('project-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function naviguerImage(direction) {
            if(imagesModale.length <= 1) return;
            indexImageActive += direction;
            if(indexImageActive >= imagesModale.length) indexImageActive = 0;
            if(indexImageActive < 0) indexImageActive = imagesModale.length - 1;
            mettreAJourAffichageImage();
        }

        function mettreAJourAffichageImage() {
            document.getElementById('modal-img-target').src = imagesModale[indexImageActive];
            document.getElementById('modal-counter-target').textContent = `${indexImageActive + 1} / ${imagesModale.length}`;
        }

        function declencherTelechargement(base64, nom) {
            try {
                const bChars = atob(base64.includes(',') ? base64.split(',')[1] : base64);
                const bNumbers = new Array(bChars.length);
                for (let i = 0; i < bChars.length; i++) bNumbers[i] = bChars.charCodeAt(i);
                const blob = new Blob([new Uint8Array(bNumbers)], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = nom;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch(e) { alert("Erreur de téléchargement du fichier : " + e.message); }
        }

        // ══════════ COUPLAGE ET AFFICHAGE GRILLE ══════════
        function fabriquerGrilleProjets() {
            const container = document.getElementById('projects-container');
            const tri = document.getElementById('sort-date-select').value;
            
            let copies = [...listeProjetsGlobale];
            copies.sort((a,b) => {
                const dA = a.date ? new Date(a.date.split('/').reverse().join('-')) : new Date(0);
                const dB = b.date ? new Date(b.date.split('/').reverse().join('-')) : new Date(0);
                return tri === 'recent' ? dB - dA : dA - dB;
            });

            container.innerHTML = "";

            copies.forEach(p => {
                const cat = p.cat ? p.cat.trim() : 'Général';
                if(categorieActive !== 'all' && cat.toLowerCase() !== categorieActive.toLowerCase()) return;

                const card = document.createElement('div');
                card.className = 'project-card';

                // Compter le nombre total de photos dispo
                let totalPhotos = 0;
                let imgSource = "";
                if(p.photos && p.photos.length > 0) {
                    totalPhotos = p.photos.filter(img => img && img.trim() !== "").length;
                    imgSource = p.photos[0];
                } else if(p.photo && p.photo.trim() !== "") {
                    totalPhotos = 1;
                    imgSource = p.photo;
                }

                let badgeHTML = totalPhotos > 1 ? `<div class="card-gallery-badge">📸 ${totalPhotos} images</div>` : '';
                let coverHTML = imgSource ? `<img class="project-img" src="${imgSource}" alt="">` : `<div class="project-img-placeholder">📁</div>`;

                card.innerHTML = `
                    ${badgeHTML}
                    ${coverHTML}
                    <div class="project-content">
                        <div class="project-meta">
                            <span class="project-cat">${cat}</span>
                            <span>${p.date || ''}</span>
                        </div>
                        <h3 class="project-title">${p.titre}</h3>
                        <p class="project-desc-short">${p.desc || 'Aucune description disponible.'}</p>
                        <div class="click-prompt">🔍 Cliquer pour ouvrir les détails</div>
                    </div>
                `;

                // Événement d'ouverture au clic sur la carte entière
                card.addEventListener('click', () => afficherProjetEnDetail(p));
                container.appendChild(card);
            });
        }

        // ══════════ CORPS PRINCIPAL ══════════
        async function run() {
            initialiserTheme();
            configurerEvenementsModale();

            try {
                const res = await fetch(`${DATA_URL}?t=${Date.now()}`);
                const data = await res.json();
                
                // Profil construct
                const prof = data.profil || {};
                const user = prof.nom || 'Portfolio';
                
                let avatarHTML = `<div class="profile-img-black">${user.charAt(0)}</div>`;
                if(prof.photo && prof.photo.trim() !== "") {
                    avatarHTML = `<img class="profile-img" src="${prof.photo}" alt="Avatar">`;
                }

                document.getElementById('profile-container').innerHTML = `
                    ${avatarHTML}
                    <div class="profile-info">
                        <h1>${user}</h1>
                        <h2>${prof.titre || 'Concepteur'}</h2>
                        <p>${prof.bio || 'Découvrez mon espace de travail et mes créations.'}</p>
                        <div class="social-links">
                            ${prof.github ? `<a href="${prof.github}" target="_blank">GitHub</a>` : ''}
                            ${prof.instagram ? `<a href="${prof.instagram}" target="_blank">Instagram</a>` : ''}
                        </div>
                    </div>
                `;

                listeProjetsGlobale = data.projets || [];
                
                // Catégories de filtres
                const cats = new Set();
                listeProjetsGlobale.forEach(p => { if(p.cat) cats.add(p.cat.trim()) });
                
                const fltBox = document.getElementById('filters-container');
                fltBox.innerHTML = `<button class="filter-btn active" data-target="all">🌟 Tous</button>`;
                cats.forEach(c => {
                    fltBox.innerHTML += `<button class="filter-btn" data-target="${c.toLowerCase()}">${c}</button>`;
                });

                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.addEventListener('click', () => {
                        document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
                        b.classList.add('active');
                        categorieActive = b.getAttribute('data-target');
                        fabriquerGrilleProjets();
                    });
                });

                document.getElementById('sort-date-select').addEventListener('change', fabriquerGrilleProjets);
                fabriquerGrilleProjets();

            } catch(e) {
                document.getElementById('diagnostic-container').innerHTML = `<div class="error-box">Impossible de récupérer data.json depuis GitHub.</div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', run);
    </script>
</body>
</html>
