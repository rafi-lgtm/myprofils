<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ══════════ VARIABLES DE THÈMES ══════════ */
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c26;
            --border: rgba(255,255,255,0.07);
            --accent: #7c6ff7;
            --accent2: #3ecfb2;
            --text: #f0f0f8;
            --muted: #888899;
        }

        [data-theme="light"] {
            --bg: #f4f4f9;
            --surface: #ffffff;
            --surface2: #eaeaea;
            --border: rgba(0,0,0,0.08);
            --accent: #5a4ee3;
            --accent2: #14b8a6;
            --text: #1e1e2f;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
        
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px; pointer-events: none; z-index: 0;
        }

        .wrapper { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 24px 80px; }

        /* NAV & BUTTONS */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 28px 0; border-bottom: 1px solid var(--border); margin-bottom: 60px; }
        .logo { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        
        .btn-theme { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-theme:hover { background: var(--surface2); }
        
        .btn-nav-profil { font-family: 'Space Mono', monospace; font-size: 11px; background: transparent; color: var(--accent2); border: 1px solid rgba(62,207,178,0.3); padding: 8px 14px; border-radius: 6px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s; }
        .btn-nav-profil:hover { background: rgba(62,207,178,0.1); border-color: var(--accent2); }

        /* TABS */
        .tabs { display: flex; gap: 4px; margin-bottom: 48px; border-bottom: 1px solid var(--border); }
        .tab { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 18px; background: transparent; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* PAGES */
        .page { display: none; }
        .page.active { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* PROFIL */
        .profile-hero { display: grid; grid-template-columns: auto 1fr; gap: 36px; align-items: start; margin-bottom: 56px; }
        .avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 36px; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-upload { font-family: 'Space Mono', monospace; font-size: 10px; background: var(--surface); color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; cursor: pointer; }
        .btn-upload:hover { color: var(--text); border-color: var(--accent); }

        .profile-info { padding-top: 8px; }
        .profile-name { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
        .profile-title { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 14px; }
        .profile-bio { font-size: 15px; color: var(--muted); line-height: 1.7; font-weight: 300; max-width: 500px; margin-bottom: 20px; }
        .social-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .social-link { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; text-decoration: none; letter-spacing: 0.05em; transition: all 0.2s; display: flex; align-items: center; gap: 6px; background: var(--surface); }
        .social-link:hover { border-color: var(--accent2); color: var(--accent2); }

        .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .skill-tag { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); background: var(--surface2); border: 1px solid var(--border); padding: 5px 14px; border-radius: 6px; }

        /* CARDS */
        .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
        .section-title { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }
        
        .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.25s; display: flex; flex-direction: column; }
        .project-card.clickable { cursor: pointer; }
        .project-card.clickable:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .project-img-container { width: 100%; height: 160px; background: var(--surface2); overflow: hidden; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
        .project-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .project-img-placeholder { font-size: 32px; opacity: 0.4; }

        .project-card-content { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-cat { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
        .card-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; flex-grow: 1; white-space: pre-wrap; }
        .tech-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .tech-tag { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent2); background: var(--surface2); padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); }

        .helper-box { background: var(--surface2); padding: 12px; border-radius: 8px; font-size: 11px; font-family: monospace; color: var(--muted); margin-top: 15px; border: 1px dashed var(--border); }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--muted); }

        footer { margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .footer-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

        @media (max-width: 640px) { .profile-hero { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="wrapper">
    <nav>
        <div class="logo" id="nav-logo">PORTFOLIO.DEV</div>
        <div class="nav-right">
            <button class="btn-theme" id="theme-toggle" onclick="toggleTheme()">🌙</button>
            <button class="btn-nav-profil" onclick="goToTab('profil')">Profil</button>
        </div>
    </nav>

    <div class="tabs">
        <button class="tab active" onclick="goToTab('projets')" id="tab-projets">// Projets</button>
        <button class="tab" onclick="goToTab('profil')" id="tab-profil">// Profil</button>
    </div>

    <div class="page active" id="page-projets">
        <div class="section-header">
            <span class="section-title">// Réalisations</span>
            <span class="section-count" id="count-label">0 projet</span>
        </div>
        <div class="projects-grid" id="projects-container"></div>
    </div>

    <div class="page" id="page-profil">
        <div id="profile-display"></div>
    </div>

    <footer>
        <span class="footer-text">Portfolio · 2026</span>
        <span class="footer-text" id="footer-date"></span>
    </footer>
</div>

<script>
let projets = [];
let profil = {};

function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', targetTheme);
    document.getElementById('theme-toggle').textContent = targetTheme === 'light' ? '☀️' : '🌙';
    localStorage.setItem('theme', targetTheme);
}

const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('theme-toggle').textContent = savedTheme === 'light' ? '☀️' : '🌙';

async function init() {
    let dataChargee = await chargerDonnees();
    if (!dataChargee) {
        document.getElementById('projects-container').innerHTML = `<div class="empty-state">⚠️ Erreur de chargement data.json</div>`;
    }
    afficherProjets();
    afficherProfil();
    document.getElementById('footer-date').textContent = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
}

async function chargerDonnees() {
    try {
        const antiCache = new Date().getTime();
        const url = `https://raw.githubusercontent.com/rafi-lgtm/myprofils/main/data.json?t=${antiCache}`;
        let res = await fetch(url, { cache: "no-store" }); 
        if (!res.ok) {
            const urlMaster = `https://raw.githubusercontent.com/rafi-lgtm/myprofils/master/data.json?t=${antiCache}`;
            res = await fetch(urlMaster, { cache: "no-store" });
            if (!res.ok) return false;
        }
        const data = await res.json();
        projets = data.projets || [];
        profil = data.profil || {};
        return true;
    } catch (e) { return false; }
}

function afficherProjets() {
    const container = document.getElementById('projects-container');
    container.innerHTML = '';
    document.getElementById('count-label').textContent = `${projets.length} projet${projets.length > 1 ? 's' : ''}`;

    if(projets.length === 0) {
        container.innerHTML = `<div class="empty-state">📂 Aucun projet à afficher.</div>`;
        return;
    }

    projets.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'project-card';

        // Gérer le lien du projet (Correction ici !)
        let unLien = p.link && (p.link.startsWith('http') || p.link.includes('.'));
        let realLink = "";
        if (unLien) {
            realLink = p.link.startsWith('http') ? p.link : `https://${p.link}`;
            card.classList.add('clickable');
            card.onclick = () => window.open(realLink, '_blank');
        }

        // Zone Image du projet
        let imgHTML = `<div class="project-img-placeholder">💻</div>`;
        if (p.photo && p.photo.length > 10) {
            imgHTML = `<img src="${p.photo}" alt="${p.titre}">`;
        }

        const tagsHTML = p.tech ? p.tech.split(',').map(t => `<span class="tech-tag">${t.trim()}</span>`).join('') : '';

        let linkHTML = '';
        if (unLien) {
            linkHTML = `<span class="social-link" style="margin-top:auto; display:inline-flex; width:max-content; color:var(--accent2); border-color:rgba(62,207,178,0.3)">🔗 Voir le Projet</span>`;
        }

        card.innerHTML = `
            <div class="project-img-container">${imgHTML}</div>
            <div class="project-card-content">
                <div class="card-cat">${p.cat || 'Web'}</div>
                <div class="card-title">${p.titre || 'Sans titre'}</div>
                <div class="card-desc">${p.desc || 'Pas de description.'}</div>
                <div class="tech-row">${tagsHTML}</div>
                ${linkHTML}
            </div>
        `;
        container.appendChild(card);
    });
}

function handleAvatarUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('avatar-img-element').src = e.target.result;
        document.getElementById('base64-helper').style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function afficherProfil() {
    const display = document.getElementById('profile-display');
    if (!display) return;
    
    const nom = profil.nom || "Mon Portfolio";
    document.getElementById('nav-logo').textContent = nom.toUpperCase().split(' ')[0] + '.DEV';

    let photoSrc = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23888899' d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3s-3-1.34-3-3s1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22c.03-1.99 4-3.08 6-3.08s5.97 1.09 6 3.08c-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";
    if (profil.photo && profil.photo.length > 10) photoSrc = profil.photo;

    let skillsHTML = '';
    if (profil.skills && profil.skills.length > 0) {
        skillsHTML = `<div style="margin-top:40px"><div class="section-header"><span class="section-title">// Compétences</span></div><div class="skills-grid">${profil.skills.map(s => `<span class="skill-tag">${s.trim()}</span>`).join('')}</div></div>`;
    }

    let linksHTML = '';
    if (profil.email) linksHTML += `<a href="mailto:${profil.email}" class="social-link">📧 Email</a>`;
    if (profil.github) linksHTML += `<a href="${profil.github.startsWith('http') ? profil.github : 'https://github.com/'+profil.github}" target="_blank" class="social-link">🐙 GitHub</a>`;
    if (profil.instagram) linksHTML += `<a href="${profil.instagram.startsWith('http') ? profil.instagram : 'https://instagram.com/'+profil.instagram}" target="_blank" class="social-link">📸 Instagram</a>`;

    display.innerHTML = `
        <div class="profile-hero">
            <div class="avatar-wrap">
                <div class="avatar"><img id="avatar-img-element" src="${photoSrc}"></div>
                <input type="file" id="avatar-input" style="display:none" accept="image/*" onchange="handleAvatarUpload(event)">
                <button class="btn-upload" onclick="document.getElementById('avatar-input').click()">📁 Choisir une photo</button>
            </div>
            <div>
                <div class="profile-name">${nom}</div>
                <div class="profile-title">${profil.titre || ''}</div>
                <div class="profile-bio">${profil.bio || ''}</div>
                <div class="social-row">${linksHTML}</div>
                <div class="helper-box" id="base64-helper" style="display:none">
                    <strong>Photo chargée en local !</strong> Lance ton script Python pour l'enregistrer partout.
                </div>
            </div>
        </div>
        ${skillsHTML}
    `;
}

function goToTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
}

window.onload = init;
</script>
</body>
</html>
